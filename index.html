<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Love Gallery 💕</title>

<style>
body {
    font-family: "Comic Sans MS", cursive;
    margin: 0;
    text-align: center;

    /* 🌸 Ultra aesthetic background */
    background:
        radial-gradient(circle at top left, rgba(255,182,193,0.4), transparent 40%),
        radial-gradient(circle at bottom right, rgba(255,105,180,0.3), transparent 50%),
        linear-gradient(135deg, #ffe6f0, #fff0f5, #ffe0ec);

    background-attachment: fixed;
    overflow-x: hidden;
}

/* 🌸 glowing blobs */
.blob {
    position: fixed;
    width: 200px;
    height: 200px;
    background: rgba(255,105,180,0.2);
    filter: blur(60px);
    border-radius: 50%;
    z-index: -1;
    animation: floatBlob 10s infinite ease-in-out;
}

.b1 { top: 10%; left: 10%; }
.b2 { bottom: 10%; right: 10%; background: rgba(255,182,193,0.25); }
.b3 { top: 50%; left: 50%; background: rgba(255,192,203,0.2); }

@keyframes floatBlob {
    0% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.2); }
    100% { transform: translate(0,0) scale(1); }
}

h1 { color: #ff4d88; }

.upload-box {
    margin: 20px;
    padding: 15px;
    border-radius: 15px;
    display: inline-block;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.7);
}

button {
    margin: 5px;
    padding: 8px 12px;
    border-radius: 10px;
    border: none;
    background: #ff66a3;
    color: white;
    cursor: pointer;
}

#gallery {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
}

/* 📸 Polaroid cards */
.card {
    background: white;
    padding: 10px;
    border-radius: 15px;
    width: 200px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    transform: rotate(-2deg);
    transition: 0.3s;
    position: relative;
}

.card:nth-child(even) { transform: rotate(2deg); }

.card:hover {
    transform: scale(1.03);
    box-shadow: 0 15px 30px rgba(255,105,180,0.4);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.sticker {
    position: absolute;
    right: 10px;
    top: 5px;
}

/* 💗 hearts */
.heart {
    position: fixed;
    color: pink;
    animation: floatUp 5s linear;
}

@keyframes floatUp {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}

/* ✨ sparkles */
.sparkle {
    position: fixed;
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    animation: sparkleAnim 600ms ease-out forwards;
    box-shadow: 0 0 10px pink, 0 0 20px #ff66a3;
}

@keyframes sparkleAnim {
    0% { transform: scale(1) translate(0,0); opacity: 1; }
    100% { transform: scale(0) translate(var(--x), var(--y)); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🌸 blobs -->
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<!-- LOGIN PAGE -->
<div id="loginPage">
    <h1>Our Love Story 💖</h1>
    <button onclick="login()">Login 🔐</button>
</div>

<!-- APP PAGE -->
<div id="appPage" style="display:none;">
    <h1>Our Love Story 💖</h1>
    <button onclick="logout()">Logout 🚪</button>

    <div class="upload-box">
        <input type="file" id="imageInput"><br>
        <input type="date" id="dateInput"><br>
        <input type="text" id="captionInput" placeholder="Cute caption..."><br>
        <button onclick="addMemory()">Add Memory 💕</button>
    </div>

    <div id="gallery"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, setPersistence, browserSessionPersistence, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* 🔥 Firebase */
const firebaseConfig = {
  apiKey: "AIzaSyDj0nKzzm5s-dHnPko1mCqjBQ-kRL-yG1A",
  authDomain: "art-gallery-54a36.firebaseapp.com",
  projectId: "art-gallery-54a36",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth();

setPersistence(auth, browserSessionPersistence);

const provider = new GoogleAuthProvider();

const allowedUsers = [
  "aayanyadav002@gmail.com",
  "renesha231@gmail.com"
];

/* 🔐 LOGIN */
window.login = async () => {
    await signInWithPopup(auth, provider);
};

/* 🚪 LOGOUT */
window.logout = async () => {
    await signOut(auth);
};

/* 🔍 AUTH CHECK */
onAuthStateChanged(auth, user => {
    const email = user?.email;

    if (!user || !allowedUsers.includes(email)) {
        document.getElementById("loginPage").style.display = "block";
        document.getElementById("appPage").style.display = "none";
        return;
    }

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("appPage").style.display = "block";

    render();
});

/* ⚡ compress image */
function compressImage(file) {
    return new Promise(resolve => {
        const img = new Image();
        const reader = new FileReader();

        reader.onload = e => img.src = e.target.result;

        img.onload = () => {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            const maxW = 800;
            const scale = maxW / img.width;

            canvas.width = maxW;
            canvas.height = img.height * scale;

            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(blob => resolve(blob), "image/jpeg", 0.7);
        };

        reader.readAsDataURL(file);
    });
}

/* ➕ ADD MEMORY */
window.addMemory = async () => {
    let file = document.getElementById("imageInput").files[0];
    const date = document.getElementById("dateInput").value;
    const caption = document.getElementById("captionInput").value;

    if (!file || !date) return alert("Add photo + date!");

    file = await compressImage(file);

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "art_gallery");

    const res = await fetch("https://api.cloudinary.com/v1_1/ddolpgtum/image/upload", {
        method: "POST",
        body: formData
    });

    const data = await res.json();

    await addDoc(collection(db, "memories"), {
        img: data.secure_url,
        date,
        caption
    });

    render();
};

/* 🗑 DELETE */
window.deleteMemory = async (id) => {
    await deleteDoc(doc(db, "memories", id));
    render();
};

/* 🎨 RENDER */
async function render() {
    const container = document.getElementById("gallery");
    container.innerHTML = "";

    const snapshot = await getDocs(collection(db, "memories"));

    const stickers = ["💖","🌸","✨","🐻","💘","🦋","🎀","🌈"];

    snapshot.forEach(docSnap => {
        const m = docSnap.data();
        const sticker = stickers[Math.floor(Math.random()*stickers.length)];

        container.innerHTML += `
        <div class="card">
            <div class="sticker">${sticker}</div>
            <img src="${m.img.replace('/upload/', '/upload/w_400,q_auto/')}">
            <p>${m.date}</p>
            <p>${m.caption}</p>
            <button onclick="deleteMemory('${docSnap.id}')">Delete</button>
        </div>`;
    });
}

/* 💗 hearts */
setInterval(() => {
    if (document.querySelectorAll(".heart").length > 12) return;

    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💗";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random()*15) + "px";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
}, 1200);

/* ✨ sparkle click */
document.addEventListener("click", (e) => {
    for (let i = 0; i < 8; i++) {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";

        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * 40;

        sparkle.style.left = e.clientX + "px";
        sparkle.style.top = e.clientY + "px";
        sparkle.style.setProperty("--x", Math.cos(angle)*distance + "px");
        sparkle.style.setProperty("--y", Math.sin(angle)*distance + "px");

        document.body.appendChild(sparkle);
        setTimeout(() => sparkle.remove(), 600);
    }
});
</script>

</body>
</html>
